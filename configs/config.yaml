model:
  endpoint: "http://127.0.0.1:11453/v1/"
  api_key: "no-key"
  model_name: "mradermacher/Huihui-Qwen3.5-27B-abliterated-GGUF/Huihui-Qwen3.5-27B-abliterated.Q4_K_M"
  context_size: 200000

agent:
  max_iterations: 100
  temperature: 0.7

state:
  dir: "./state"
  auto_save: true

tools:
  work_dir: "."
  # 用户特别指定的命令白名单
  # 常见构建命令（gcc、cargo、node、npm、python、java等）由安全审查器自动包含
  # 不在白名单中的命令会通过安全审查器检查，非危险命令会在CLI模式下询问确认
  allow_commands:
    - "go"
    - "git"
    - "ls"
    - "cat"
    - "mkdir"
    - "rm"
