name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-cli:
    name: CLI ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: ".exe"
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Get short SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: >
          go build
          -ldflags "-w -s"
          -o mukaai-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.sha.outputs.short }}${{ matrix.ext }}
          ./cmd/agentplus

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mukaai-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mukaai-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.sha.outputs.short }}${{ matrix.ext }}

  build-gui:
    name: GUI linux/amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build GUI
        run: >
          go build
          -tags gui
          -ldflags "-w -s"
          -o mukaai-gui-linux-amd64-${{ steps.sha.outputs.short }}
          ./cmd/agentplus

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mukaai-gui-linux-amd64
          path: mukaai-gui-linux-amd64-${{ steps.sha.outputs.short }}
